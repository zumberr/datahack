services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: bravobot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bravobot
      POSTGRES_PASSWORD: bravobot
      POSTGRES_DB: bravobot
    ports:
      - "5432:5432"
    volumes:
      - bravobot_pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bravobot -d bravobot"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  bravobot_pgdata:
